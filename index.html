<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE Accumulation Scanner</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111827; color: #e8eaf0;
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; text-align: center; }
  .box { padding: 40px 32px; }
  h1 { font-size: 28px; color: #D4541A; margin-bottom: 12px; }
  p { color: #aab; font-size: 15px; line-height: 1.6; }
  .badge { display: inline-block; background: #1C2A3A; border: 1px solid #D4541A;
           color: #D4541A; border-radius: 8px; padding: 8px 20px;
           font-size: 13px; margin-top: 24px; }
</style>
</head>
<body>
<div class="box">
  <h1>NSE Accumulation Scanner</h1>
  <p>Daily institutional buying signals from NSE delivery data.</p>
  <p>First report will appear here after market close (7 PM IST) on the next trading day.</p>
  <div class="badge">Awaiting first scan...</div>
</div>
</body>
</html>
